syntax = "proto3";

package odddotnet.proto.appinsights.v1;

import "appinsightsproto/proto/appinsights/v1/common.proto";
import "appinsightsproto/proto/appinsights/v1/telemetry_types.proto";

option csharp_namespace = "OddDotNet.Proto.AppInsights.V1";
option java_multiple_files = true;
option java_package = "io.odddotnet.proto.appinsights.v1";
option java_outer_classname = "FlatTelemetryProto";
option go_package = "go.odddotnet.io/proto/appinsights/v1";

// TelemetryEnvelope is defined in common.proto

// Flat request telemetry with envelope context
message FlatRequest {
  RequestTelemetry request = 1;
  TelemetryEnvelope envelope = 2;
}

// Flat dependency telemetry with envelope context
message FlatDependency {
  DependencyTelemetry dependency = 1;
  TelemetryEnvelope envelope = 2;
}

// Flat exception telemetry with envelope context
message FlatException {
  ExceptionTelemetry exception = 1;
  TelemetryEnvelope envelope = 2;
}

// Flat trace telemetry with envelope context
message FlatTrace {
  TraceTelemetry trace = 1;
  TelemetryEnvelope envelope = 2;
}

// Flat event telemetry with envelope context
message FlatEvent {
  EventTelemetry event = 1;
  TelemetryEnvelope envelope = 2;
}

// Flat metric telemetry with envelope context
message FlatMetric {
  MetricTelemetry metric = 1;
  TelemetryEnvelope envelope = 2;
}

// Flat page view telemetry with envelope context
message FlatPageView {
  PageViewTelemetry page_view = 1;
  TelemetryEnvelope envelope = 2;
}

// Flat availability telemetry with envelope context
message FlatAvailability {
  AvailabilityTelemetry availability = 1;
  TelemetryEnvelope envelope = 2;
}
