syntax = "proto3";

package odddotnet.proto.appinsights.v1;

import "appinsightsproto/proto/appinsights/v1/flat_telemetry.proto";
import "appinsightsproto/proto/appinsights/v1/filters.proto";
import "odddotproto/proto/common/v1/common.proto";

option csharp_namespace = "OddDotNet.Proto.AppInsights.V1";
option java_multiple_files = true;
option java_package = "io.odddotnet.proto.appinsights.v1";
option java_outer_classname = "ExceptionQueryServiceProto";
option go_package = "go.odddotnet.io/proto/appinsights/v1";

service ExceptionQueryService {
  rpc Query(ExceptionQueryRequest) returns (ExceptionQueryResponse);
  rpc StreamQuery(ExceptionQueryRequest) returns (stream FlatException);
  rpc Reset(ExceptionResetRequest) returns (ExceptionResetResponse);
}

message ExceptionQueryRequest {
  repeated ExceptionWhere filters = 1;
  odddotnet.proto.common.v1.Take take = 2;
  optional odddotnet.proto.common.v1.Duration duration = 3;
}

message ExceptionQueryResponse {
  repeated FlatException exceptions = 1;
}

message ExceptionResetRequest {
}

message ExceptionResetResponse {
}
