syntax = "proto3";

package odddotnet.proto.appinsights.v1;

import "appinsightsproto/proto/appinsights/v1/flat_telemetry.proto";
import "appinsightsproto/proto/appinsights/v1/filters.proto";
import "odddotproto/proto/common/v1/common.proto";

option csharp_namespace = "OddDotNet.Proto.AppInsights.V1";
option java_multiple_files = true;
option java_package = "io.odddotnet.proto.appinsights.v1";
option java_outer_classname = "RequestQueryServiceProto";
option go_package = "go.odddotnet.io/proto/appinsights/v1";

service RequestQueryService {
  rpc Query(RequestQueryRequest) returns (RequestQueryResponse);
  rpc StreamQuery(RequestQueryRequest) returns (stream FlatRequest);
  rpc Reset(RequestResetRequest) returns (RequestResetResponse);
}

message RequestQueryRequest {
  repeated RequestWhere filters = 1;
  odddotnet.proto.common.v1.Take take = 2;
  optional odddotnet.proto.common.v1.Duration duration = 3;
}

message RequestQueryResponse {
  repeated FlatRequest requests = 1;
}

message RequestResetRequest {
}

message RequestResetResponse {
}
